<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cohere North · Value Appraisal Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0a0d10;
    --bg-1: #11161b;
    --bg-2: #161c23;
    --bg-3: #1e262e;
    --border: #2a3440;
    --border-bright: #3a4858;
    --text-0: #f4f1ea;
    --text-1: #c5cdd6;
    --text-2: #8795a6;
    --text-3: #5a6775;
    --accent: #e8a34d;
    --accent-bright: #f4c27a;
    --accent-dim: #8a5c20;
    --accent-fill: rgba(232, 163, 77, 0.12);
    --positive: #6ac88a;
    --negative: #e05a5a;
    --shadow-deep: 0 24px 48px rgba(0,0,0,0.6);
    --shadow-panel: 0 1px 3px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.03);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Global no-italics — override all user-agent defaults */
  em, i, cite, address, dfn, var { font-style: normal; }

  html, body {
    background: var(--bg-0);
    color: var(--text-0);
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body {
    background:
      radial-gradient(ellipse at top right, rgba(232,163,77,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at bottom left, rgba(106,200,138,0.02) 0%, transparent 40%),
      var(--bg-0);
    min-height: 100vh;
    background-attachment: fixed;
  }

  /* Subtle noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.02;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' /%3E%3C/svg%3E");
  }

  /* ==================== HEADER ==================== */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(10, 13, 16, 0.85);
    backdrop-filter: blur(20px) saturate(1.2);
    -webkit-backdrop-filter: blur(20px) saturate(1.2);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .brand-mark {
    height: 30px;
    display: flex;
    align-items: center;
    padding-right: 4px;
  }
  .brand-mark img {
    height: 100%;
    width: auto;
    display: block;
    /* Dark-green wordmark needs lifting for legibility on dark header */
    filter: brightness(1.45) saturate(1.1);
  }

  /* Vertical divider between logo and title */
  .brand::after {
    content: '';
    width: 1px;
    height: 28px;
    background: var(--border);
    margin-left: 4px;
    order: 1;
  }
  .brand-mark { order: 0; }
  .brand-text { order: 2; }

  .brand-text {
    display: flex; flex-direction: column;
  }

  .brand-title {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-weight: 500;
    font-size: 18px;
    letter-spacing: -0.3px;
    line-height: 1;
  }

  .brand-subtitle {
    font-size: 11px;
    color: var(--text-2);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .header-actions {
    display: flex; gap: 8px; align-items: center;
  }

  .btn {
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-2);
    color: var(--text-1);
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.2px;
  }
  .btn:hover { background: var(--bg-3); border-color: var(--border-bright); color: var(--text-0); }
  .btn-primary {
    background: var(--accent);
    color: var(--bg-0);
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn-primary:hover { background: var(--accent-bright); border-color: var(--accent-bright); color: var(--bg-0); }

  /* ==================== LAYOUT ==================== */
  .app {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 73px);
    position: relative;
    z-index: 2;
  }

  .sidebar {
    background: var(--bg-1);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    position: sticky;
    top: 73px;
    height: calc(100vh - 73px);
    overflow-y: auto;
  }

  .sidebar-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-3);
    font-weight: 600;
    margin-bottom: 12px;
    padding: 0 10px;
  }

  .usecase-list {
    display: flex; flex-direction: column; gap: 4px;
    margin-bottom: 28px;
  }

  .usecase-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 10px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-1);
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s ease;
    width: 100%;
  }
  .usecase-btn:hover { background: var(--bg-2); }
  .usecase-btn.active {
    background: var(--accent-fill);
    border-color: var(--accent-dim);
    color: var(--accent-bright);
  }

  .usecase-icon {
    width: 24px; height: 24px;
    flex-shrink: 0;
    color: var(--text-2);
    margin-top: 1px;
  }
  .usecase-btn.active .usecase-icon { color: var(--accent); }

  .usecase-body {
    display: flex; flex-direction: column; min-width: 0;
  }

  .usecase-name {
    font-size: 13px; font-weight: 500; line-height: 1.25;
  }

  .usecase-meta {
    font-size: 10.5px;
    color: var(--text-3);
    margin-top: 3px;
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    letter-spacing: 0.3px;
  }
  .usecase-btn.active .usecase-meta { color: var(--accent-dim); }

  .main {
    padding: 32px 40px 64px;
    max-width: 1400px;
  }

  /* ==================== USE CASE HEADER ==================== */
  .uc-header {
    margin-bottom: 28px;
    animation: fadeUp 0.5s cubic-bezier(0.22, 0.9, 0.3, 1);
  }

  .uc-eyebrow {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .uc-title {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-weight: 400;
    font-size: 38px;
    line-height: 1.05;
    letter-spacing: -0.8px;
    color: var(--text-0);
    margin-bottom: 8px;
  }

  .uc-title em {
    color: var(--accent);
    font-weight: 500;
  }

  .uc-description {
    font-size: 14px;
    color: var(--text-2);
    line-height: 1.6;
    max-width: 720px;
  }

  /* ==================== GRID ==================== */
  .workbench {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.1fr);
    gap: 28px;
  }

  @media (max-width: 1100px) {
    .workbench { grid-template-columns: 1fr; }
    .app { grid-template-columns: 180px 1fr; }
  }

  /* ==================== PANELS ==================== */
  .panel {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow-panel);
    overflow: hidden;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
  }

  .panel-title {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.2px;
    color: var(--text-0);
  }

  .panel-meta {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 10.5px;
    color: var(--text-3);
    letter-spacing: 0.5px;
  }

  .panel-body { padding: 20px; }

  /* ==================== INPUTS ==================== */
  .input-section { margin-bottom: 24px; }
  .input-section:last-child { margin-bottom: 0; }

  .section-title {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
    color: var(--text-2);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::before {
    content: '';
    width: 3px;
    height: 12px;
    background: var(--accent);
    border-radius: 1px;
  }

  .input-group {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px 14px;
    align-items: center;
    padding: 6px 0;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .input-group:hover { background: rgba(255,255,255,0.015); }

  .input-label {
    font-size: 12.5px;
    color: var(--text-1);
    line-height: 1.35;
    grid-column: 1;
  }

  .input-label-meta {
    display: block;
    font-size: 10px;
    color: var(--text-3);
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  .input-control {
    display: flex; align-items: center;
    gap: 4px;
    grid-column: 2;
  }

  .input-field {
    width: 92px;
    background: var(--bg-0);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 6px 10px;
    color: var(--text-0);
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 12px;
    font-weight: 500;
    text-align: right;
    transition: all 0.15s;
  }
  .input-field:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--bg-2);
    box-shadow: 0 0 0 3px rgba(232,163,77,0.1);
  }
  .input-field.key {
    border-color: var(--accent-dim);
    background: linear-gradient(180deg, rgba(232,163,77,0.04), rgba(232,163,77,0.08));
  }

  .input-unit {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 10.5px;
    color: var(--text-3);
    min-width: 42px;
    text-align: left;
  }

  /* ==================== RESULTS ==================== */
  .hero-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .hero-metric {
    background: var(--bg-1);
    padding: 20px 22px;
    transition: background 0.3s;
  }

  .hero-metric.full { grid-column: 1 / -1; }

  .hero-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-3);
    font-weight: 600;
    margin-bottom: 10px;
  }

  .hero-value {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-weight: 500;
    font-size: 36px;
    line-height: 1;
    letter-spacing: -1px;
    color: var(--text-0);
    font-feature-settings: "tnum";
  }

  .hero-value .sub {
    font-size: 18px;
    color: var(--text-2);
    font-weight: 400;
    letter-spacing: -0.3px;
    margin-left: 4px;
  }

  .hero-value.accent { color: var(--accent); }
  .hero-value.roi { color: var(--positive); }

  .hero-detail {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 11px;
    color: var(--text-2);
    margin-top: 6px;
    letter-spacing: 0.2px;
  }

  /* ==================== YEAR TABLE ==================== */
  .year-table {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .year-table-header {
    display: grid;
    grid-template-columns: minmax(0,1.5fr) 1fr 1fr 1fr 1fr;
    background: var(--bg-2);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    color: var(--text-3);
    border-bottom: 1px solid var(--border);
  }

  .year-table-header > div {
    padding: 10px 14px;
    text-align: right;
  }
  .year-table-header > div:first-child { text-align: left; }

  .year-table-row {
    display: grid;
    grid-template-columns: minmax(0,1.5fr) 1fr 1fr 1fr 1fr;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .year-table-row:last-child { border-bottom: none; }
  .year-table-row:hover { background: var(--bg-2); }
  .year-table-row.total { background: var(--bg-2); font-weight: 500; }
  .year-table-row.highlight { background: rgba(232,163,77,0.06); }

  .year-table-row > div {
    padding: 9px 14px;
    text-align: right;
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 12px;
    color: var(--text-0);
  }
  .year-table-row > div:first-child {
    text-align: left;
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 12.5px;
    color: var(--text-1);
  }
  .year-table-row.total > div { color: var(--text-0); font-weight: 600; }

  .year-table-row.highlight > div { color: var(--accent-bright); }

  /* ==================== DRIVER BARS ==================== */
  .driver-list {
    display: flex; flex-direction: column; gap: 2px;
  }

  .driver-item {
    padding: 10px 12px;
    border-radius: 6px;
    background: var(--bg-2);
    position: relative;
    overflow: hidden;
    transition: background 0.15s;
  }
  .driver-item:hover { background: var(--bg-3); }

  .driver-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
    position: relative; z-index: 2;
  }

  .driver-name {
    font-size: 12.5px;
    color: var(--text-0);
    font-weight: 500;
  }

  .driver-value {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 12px;
    color: var(--accent-bright);
    font-weight: 600;
    font-feature-settings: "tnum";
  }

  .driver-subline {
    display: flex; justify-content: space-between;
    font-size: 10.5px;
    color: var(--text-3);
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    position: relative; z-index: 2;
  }

  .driver-bar {
    height: 3px;
    background: var(--bg-0);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
    position: relative; z-index: 2;
  }

  .driver-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-dim) 0%, var(--accent) 100%);
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.22, 0.9, 0.3, 1);
  }

  /* ==================== CHART ==================== */
  .chart-wrap {
    background: var(--bg-2);
    border-radius: 8px;
    padding: 20px;
    margin-top: 16px;
  }

  .chart-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-3);
    font-weight: 600;
    margin-bottom: 14px;
  }

  .chart-bars {
    display: flex;
    align-items: flex-end;
    gap: 24px;
    height: 180px;
    padding: 0 20px;
    position: relative;
  }

  .chart-bars::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    border-bottom: 1px solid var(--border);
  }

  .chart-bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    height: 100%;
  }

  .chart-stack {
    width: 100%;
    max-width: 72px;
    display: flex;
    flex-direction: column-reverse;
    margin: auto auto 0;
  }

  .chart-segment {
    width: 100%;
    transition: all 0.6s cubic-bezier(0.22, 0.9, 0.3, 1);
    position: relative;
  }
  .chart-segment:hover {
    filter: brightness(1.15);
  }

  .chart-label {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 11px;
    color: var(--text-2);
    margin-top: 10px;
    letter-spacing: 0.5px;
  }

  .chart-total {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 12px;
    color: var(--text-0);
    font-weight: 600;
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
  }

  .chart-legend {
    display: flex; flex-wrap: wrap; gap: 12px;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px;
    color: var(--text-2);
  }

  .legend-swatch {
    width: 10px; height: 10px;
    border-radius: 2px;
  }

  /* ==================== MISC ==================== */
  .caveat {
    margin-top: 20px;
    padding: 12px 14px;
    background: rgba(232,163,77,0.05);
    border-left: 2px solid var(--accent);
    border-radius: 4px;
    font-size: 11.5px;
    color: var(--text-2);
    line-height: 1.55;
  }

  .caveat strong { color: var(--accent); font-weight: 600; }

  /* Key input highlight */
  .key-marker {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-left: 6px;
    vertical-align: 1px;
  }

  /* ==================== ANIMATIONS ==================== */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes countUp {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .counting { animation: countUp 0.3s ease; }

  .hidden { display: none !important; }

  /* ==================== SCROLLBAR ==================== */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-0); }
  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

  /* Print-friendly export snapshot */
  @media print {
    .sidebar, .app-header { display: none; }
    .app { grid-template-columns: 1fr; }
    .main { padding: 0; }
    body { background: white; color: black; }
    .panel { border: 1px solid #ccc; background: white; }
  }
</style>
</head>
<body>

      { id: 'users_y3',    label: 'Users — Year 3', default: 2500, unit: 'users', key: true },
      { id: 'fee_y1',      label: 'Cohere fee — Year 1', default: 250000, unit: '$', key: true },
      { id: 'fee_y2',      label: 'Cohere fee — Year 2', default: 1400000, unit: '$', key: true },
      { id: 'fee_y3',      label: 'Cohere fee — Year 3', default: 3500000, unit: '$', key: true },
      { id: 'rf_y1',       label: 'Value realization factor — Y1', default: 1.0, unit: 'x', key: true },
      { id: 'rf_y2',       label: 'Value realization factor — Y2', default: 2.0, unit: 'x', key: true },
      { id: 'rf_y3',       label: 'Value realization factor — Y3', default: 2.5, unit: 'x', key: true },
    ]},
  ],
  compute(i) {
    const netback = i.oil_price * i.nri - i.var_loe;
    const events = i.wells * i.alarms * i.field_resp;
    const hoursAvoided = events * i.downtime_hr * i.dt_reduct;
    const bblsRecovered = (hoursAvoided / 24) * i.well_prod * i.prod_impact;
    const deferredBase = bblsRecovered * netback;

    const totalRolls = i.wells * i.rolls;
    const truckBase = totalRolls * i.roll_reduct * i.roll_cost;

    // productivity applies to users (capped)
    const prod = (users) => {
      const cap = Math.min(users, 1500);
      return cap * i.tech_cost * i.admin_time * i.admin_red * i.capture;
    };

    const dqBase = i.wells * i.wos * i.rework_rate * i.rework_cost * i.dq_imp;

    const safetyBase = (users) => {
      const cap = Math.min(users, 1500);
      return (cap / 100) * i.recordables * i.inc_reduct * i.incident_cost;
    };

    const years = [
      { rf: i.rf_y1, users: i.users_y1, fee: i.fee_y1 },
      { rf: i.rf_y2, users: i.users_y2, fee: i.fee_y2 },
      { rf: i.rf_y3, users: i.users_y3, fee: i.fee_y3 },
    ];

    const rows = years.map(y => ({
      deferred:  deferredBase * y.rf,
      truck:     truckBase * y.rf,
      prod:      prod(y.users),
      dq:        dqBase * y.rf,
      safety:    safetyBase(y.users),
      users:     y.users,
      fee:       y.fee,
    }));

    rows.forEach(r => { r.gross = r.deferred + r.truck + r.prod + r.dq + r.safety; r.net = r.gross - r.fee; r.roi = r.gross / (r.fee || 1); });

    return {
      years: rows,
      drivers: [
        { name: 'Deferred production',     key: 'deferred' },
        { name: 'Truck-roll reduction',    key: 'truck' },
        { name: 'Technician productivity', key: 'prod' },
        { name: 'Work order quality',      key: 'dq' },
        { name: 'Safety & incidents',      key: 'safety' },
      ],
      context: { netback, eventsPerYear: events }
    };
  }
};

    ]},
    { title: 'Plan Quality & Rework', inputs: [

      { id: 'pass_future',  label: 'First-pass approval rate (future)',   default: 0.75, unit: '%', pct: true, key: true },
      { id: 'rework_hrs',   label: 'Rework hours per sent-back plan',     default: 4.0, unit: 'hrs' },
    ]},
    { title: 'Plan-Defect NPT Avoidance', inputs: [
      { id: 'npt_rate_base',  label: 'Jobs with plan-defect NPT (baseline)', default: 0.06, unit: '%', pct: true },
      { id: 'npt_rate_future', label: 'Jobs with plan-defect NPT (future)',  default: 0.04, unit: '%', pct: true, key: true },

    ]},
    { title: 'Cohere North Platform', inputs: [
      { id: 'users_y1',    label: 'Users — Year 1', default: 100, unit: 'users', key: true },
      { id: 'users_y2',    label: 'Users — Year 2', default: 900, unit: 'users', key: true },

    // Full-realization annual per-category value
    const plannerBase   = jobsYearFull * plannerPerJob;

    const cycleFrac = i.cycle_base > 0 ? daysSaved / i.cycle_base : 0;

      planner:   plannerBase * y.rf,
      cycle:     cycleBase * y.rf,
      rework:    reworkBase * y.rf,
      npt:       nptBase * y.rf,
      knowledge: knowledgeBase * y.rf,
      users:     y.users,
      fee:       y.fee,
    }));
    rows.forEach(r => {
      r.gross = r.planner + r.cycle + r.rework + r.npt + r.knowledge;
      r.net = r.gross - r.fee;
      r.roi = r.gross / (r.fee || 1);
    });

    return {
      years: rows,
      drivers: [
        { name: 'Planner hours saved',      key: 'planner' },
        { name: 'Cycle-time value',         key: 'cycle' },
        { name: 'Rework elimination',       key: 'rework' },
        { name: 'Plan-defect NPT avoided',  key: 'npt' },
        { name: 'Knowledge capture uplift', key: 'knowledge' },
      ],
      context: {
        jobsYearFull,
        hoursSavedPerJob,
      }
    };
  }
};

// Production scope: Global OFS workforce operations — recruiting, certification,
// JD lifecycle, training, and field-alignment coordination. ~15,000 employees
// in scope across global footprint. 3-year production rollout.
//
const UC_WORKFORCE = {
  id: 'workforce',
  icon: Icons.workforce,
  name: 'Workforce Operations Agent',
  meta: '~15,000 FTEs · Global HR',
  title: 'Workforce <em>Operations</em> Agent',
  eyebrow: 'Use Case · 05',
  description: 'Agentic workforce operations at enterprise scale — job-description lifecycle, certification tracking, personalized training, recruiting, and field readiness. Integrates with HRIS, LMS, and field ops systems to accelerate time-to-fill, eliminate certification gaps before mobilization, and redirect wasted training investment. Modeled as a 3-year production rollout across the full workforce footprint.',
  sections: [
    { title: 'Workforce Scope (Global)', inputs: [
      { id: 'ftes',         label: 'Field-facing FTEs (global)',     default: 15000, unit: 'FTEs', key: true },
      { id: 'hrbps',        label: 'HRBPs supporting scope',         default: 40,    unit: 'FTEs' },
      { id: 'recruiters',   label: 'Recruiters supporting scope',    default: 35,    unit: 'FTEs' },
      { id: 'coordinators', label: 'Ops / training coordinators',    default: 60,    unit: 'FTEs' },
    ]},
    { title: 'Recruiting — Time-to-Fill', inputs: [
      { id: 'reqs_year',    label: 'Reqs opened per year',           default: 1500, unit: 'reqs', key: true },
      { id: 'ttf_base',     label: 'Time-to-fill baseline',          default: 65,   unit: 'days', key: true },
      { id: 'ttf_future',   label: 'Time-to-fill future',            default: 50,   unit: 'days', key: true },
      { id: 'vacancy_cost_day',  label: 'Daily crew-capacity exposure per vacancy', default: 850, unit: '$/day' },
      { id: 'recruiter_hrs',     label: 'Recruiter hrs saved per req', default: 10, unit: 'hrs' },
      { id: 'recruiter_rate',    label: 'Fully-loaded recruiter $/hr', default: 85, unit: '$/hr' },
    ]},
    { title: 'Certification — Mobilization Gap Avoidance', inputs: [
      { id: 'mobs_year',    label: 'Mobilizations per year',         default: 18000, unit: 'mobs', key: true },
      { id: 'cert_gap_base',  label: 'Mobs with cert-gap (baseline)', default: 0.08, unit: '%', pct: true },
      { id: 'cert_gap_future', label: 'Mobs with cert-gap (future)',  default: 0.03, unit: '%', pct: true, key: true },
      { id: 'cert_recovery_cost', label: 'Avg recovery cost per cert-gap mob', default: 2800, unit: '$' },
      { id: 'cert_npt_rate', label: '% of gaps that slip to location',   default: 0.15, unit: '%', pct: true },
      { id: 'cert_npt_cost', label: 'Customer NPT exposure per slipped gap',  default: 25000, unit: '$' },
    ]},
    { title: 'JD Refresh & Recruiting Quality', inputs: [
      { id: 'jds_in_scope',    label: 'Active JDs in scope',            default: 150, unit: 'JDs' },
      { id: 'jd_rewrite_hrs',  label: 'Hours per current-state rewrite', default: 40, unit: 'hrs' },
      { id: 'jd_refreshes',    label: 'JDs refreshed per year',         default: 50, unit: 'JDs', key: true },
      { id: 'jd_future_hrs',   label: 'Hours per future-state review',  default: 8,  unit: 'hrs' },
      { id: 'hrbp_rate',       label: 'Fully-loaded HRBP $/hr',         default: 110, unit: '$/hr' },
    ]},
    { title: 'Training — Capability Uplift', inputs: [
      { id: 'training_hrs_fte',        label: 'Training hrs per FTE / yr (baseline)', default: 60, unit: 'hrs' },
      { id: 'training_waste',          label: '% training that fails to close a gap', default: 0.40, unit: '%', pct: true },
      { id: 'training_waste_reduction', label: 'Reduction in wasted training hrs',    default: 0.40, unit: '%', pct: true, key: true },
      { id: 'training_hr_cost',        label: 'Cost per training hour (LMS + labor)', default: 75, unit: '$/hr' },
    ]},
    { title: 'Field Alignment — Coordinator & DM Time', inputs: [
      { id: 'align_hrs_week',   label: 'Coordinator alignment hrs/week (baseline)', default: 8,   unit: 'hrs', key: true },
      { id: 'align_hrs_future', label: 'Coordinator alignment hrs/week (future)',   default: 1.5, unit: 'hrs', key: true },
      { id: 'coord_rate',       label: 'Fully-loaded coordinator $/hr',             default: 75,  unit: '$/hr' },
      { id: 'dm_hrs_week',      label: 'District Manager alignment hrs/week (baseline)', default: 3,   unit: 'hrs' },
      { id: 'dm_hrs_future',    label: 'District Manager alignment hrs/week (future)',   default: 0.5, unit: 'hrs' },
      { id: 'dm_rate',          label: 'Fully-loaded District Manager $/hr',        default: 180, unit: '$/hr' },
      { id: 'districts',        label: 'Districts in scope (alignment scales with)', default: 45, unit: 'districts' },
    ]},
    { title: 'Cohere North Platform', inputs: [
      { id: 'users_y1',    label: 'Users — Year 1', default: 100, unit: 'users', key: true },
      { id: 'users_y2',    label: 'Users — Year 2', default: 900, unit: 'users', key: true },
      { id: 'users_y3',    label: 'Users — Year 3', default: 2500, unit: 'users', key: true },
      { id: 'fee_y1',      label: 'Cohere fee — Year 1', default: 250000, unit: '$', key: true },
      { id: 'fee_y2',      label: 'Cohere fee — Year 2', default: 1400000, unit: '$', key: true },
      { id: 'fee_y3',      label: 'Cohere fee — Year 3', default: 3500000, unit: '$', key: true },
      { id: 'rf_y1',       label: 'Value realization — Y1', default: 0.50, unit: '%', pct: true, key: true },
      { id: 'rf_y2',       label: 'Value realization — Y2', default: 0.80, unit: '%', pct: true, key: true },
      { id: 'rf_y3',       label: 'Value realization — Y3', default: 1.00, unit: '%', pct: true, key: true },
    ]},
  ],
  compute(i) {
    // Full-realization annual per-category value

    // Driver 1: Recruiting
    const daysSavedPerReq = i.ttf_base - i.ttf_future;
    const vacancyAnnual = i.reqs_year * daysSavedPerReq * i.vacancy_cost_day;
    const recruiterTimeAnnual = i.reqs_year * i.recruiter_hrs * i.recruiter_rate;
    const recruitingBase = vacancyAnnual + recruiterTimeAnnual;

    // Driver 2: Certification gap avoidance
    const gapRateDelta = i.cert_gap_base - i.cert_gap_future;
    const recoveryAnnual = i.mobs_year * gapRateDelta * i.cert_recovery_cost;
    const nptAnnual = i.mobs_year * gapRateDelta * i.cert_npt_rate * i.cert_npt_cost;
    const certBase = recoveryAnnual + nptAnnual;

    // Driver 3: JD refresh (annual run-rate)
    const jdHoursSaved = i.jd_refreshes * (i.jd_rewrite_hrs - i.jd_future_hrs);
    const jdBase = jdHoursSaved * i.hrbp_rate;

    // Driver 4: Training uplift (annual)
    const wastedHoursYear = i.ftes * i.training_hrs_fte * i.training_waste;
    const reclaimedHoursYear = wastedHoursYear * i.training_waste_reduction;
    const trainingBase = reclaimedHoursYear * i.training_hr_cost;

    // Driver 5: Field alignment — scales with districts
    const weeksPerYear = 52;
    const coordHoursAnnual = (i.align_hrs_week - i.align_hrs_future) * weeksPerYear * i.districts;
    const dmHoursAnnual    = (i.dm_hrs_week - i.dm_hrs_future) * weeksPerYear * i.districts;
    const alignmentBase = (coordHoursAnnual * i.coord_rate) + (dmHoursAnnual * i.dm_rate);

    const years = [
      { rf: i.rf_y1, users: i.users_y1, fee: i.fee_y1 },
      { rf: i.rf_y2, users: i.users_y2, fee: i.fee_y2 },
      { rf: i.rf_y3, users: i.users_y3, fee: i.fee_y3 },
    ];

    const rows = years.map(y => ({
      recruiting: recruitingBase * y.rf,
      cert:       certBase * y.rf,
      jd:         jdBase * y.rf,
      training:   trainingBase * y.rf,
      alignment:  alignmentBase * y.rf,
      users:      y.users,
      fee:        y.fee,
    }));
    rows.forEach(r => {
      r.gross = r.recruiting + r.cert + r.jd + r.training + r.alignment;
      r.net = r.gross - r.fee;
      r.roi = r.gross / (r.fee || 1);
    });

    return {
      years: rows,
      drivers: [
        { name: 'Recruiting & time-to-fill',   key: 'recruiting' },
        { name: 'Certification gap avoidance', key: 'cert' },
        { name: 'JD refresh efficiency',       key: 'jd' },
        { name: 'Training capability uplift',  key: 'training' },
        { name: 'Field alignment hours',       key: 'alignment' },
      ],
      context: {
        daysSavedPerReq,
        gapRateDelta,
      }
    };
  }
};


const USE_CASES = [UC_FIELD, UC_SAFETY, UC_PROD, UC_JOBPLAN, UC_WORKFORCE];

// ============================================================
// STATE
// ============================================================
let state = {
  activeId: 'field',
  values: {},  // {useCaseId: {inputId: value}}
};

// Initialize defaults
USE_CASES.forEach(uc => {
  state.values[uc.id] = {};
  uc.sections.forEach(s => s.inputs.forEach(inp => {
    state.values[uc.id][inp.id] = inp.default;
  }));
});

// ============================================================
// FORMATTING
// ============================================================
function fmtUSD(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1e9) return `$${(n/1e9).toFixed(2)}B`;
  if (abs >= 1e6) return `$${(n/1e6).toFixed(2)}M`;
  if (abs >= 1e3) return `$${(n/1e3).toFixed(0)}K`;
  return `$${n.toFixed(0)}`;
}
function fmtUSDFull(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return '$' + Math.round(n).toLocaleString('en-US');
}
function fmtNum(n, decimals = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function fmtPct(n, decimals = 1) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return (n * 100).toFixed(decimals) + '%';
}
function fmtROI(n) {
  if (n === null || n === undefined || isNaN(n) || !isFinite(n)) return '—';
  return n.toFixed(1) + 'x';
}

// RENDERING
// ============================================================
function renderSidebar() {
  const el = document.getElementById('usecase-list');
  el.innerHTML = USE_CASES.map(uc => `
    <button class="usecase-btn ${uc.id === state.activeId ? 'active' : ''}" data-id="${uc.id}">
      ${uc.icon}
      <div class="usecase-body">
        <div class="usecase-name">${uc.name}</div>
        <div class="usecase-meta">${uc.meta}</div>
      </div>
    </button>
  `).join('');
  el.querySelectorAll('.usecase-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.activeId = btn.dataset.id;
      renderAll();
    });
  });
}

function renderHeader() {
  const uc = USE_CASES.find(u => u.id === state.activeId);
  document.getElementById('uc-header').innerHTML = `
    <div class="uc-eyebrow">${uc.eyebrow}</div>
    <h1 class="uc-title">${uc.title}</h1>
    <p class="uc-description">${uc.description}</p>
  `;
}

function renderInputs() {
  const uc = USE_CASES.find(u => u.id === state.activeId);
  const vals = state.values[uc.id];
  const body = document.getElementById('inputs-body');
  const total = uc.sections.reduce((s, sec) => s + sec.inputs.length, 0);
  document.getElementById('inputs-count').textContent = `${total} inputs`;

  body.innerHTML = uc.sections.map(sec => `
    <div class="input-section">
      <div class="section-title">${sec.title}</div>
      ${sec.inputs.map(inp => {
        const isPct = inp.pct;
        const raw = vals[inp.id];
        const display = isPct ? (raw * 100).toFixed(2).replace(/\.?0+$/, '') : raw;
        return `
        <div class="input-group">
          <div class="input-label">
            ${inp.label}${inp.key ? '<span class="key-marker"></span>' : ''}
          </div>
          <div class="input-control">
            <input
              type="number"
              class="input-field ${inp.key ? 'key' : ''}"
              data-id="${inp.id}"
              data-pct="${!!isPct}"
              value="${display}"
              step="${isPct ? '0.1' : (Math.abs(raw) < 1 ? '0.01' : (Math.abs(raw) > 100000 ? '10000' : '1'))}"
            >
            <span class="input-unit">${inp.unit}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
  `).join('');

  body.querySelectorAll('input.input-field').forEach(field => {
    field.addEventListener('input', (e) => {
      const id = e.target.dataset.id;
      const isPct = e.target.dataset.pct === 'true';
      let v = parseFloat(e.target.value);
      if (isNaN(v)) return;
      if (isPct) v = v / 100;
      state.values[uc.id][id] = v;
      renderResults();
    });
  });
}

function driverColor(idx, total) {
  // Warm amber-to-deep palette for drivers
  const palette = [
    '#f4c27a', '#e8a34d', '#c98432', '#a36821', '#7d5015', '#5a3a0f'
  ];
  return palette[idx % palette.length];
}

function renderResults() {
  const uc = USE_CASES.find(u => u.id === state.activeId);
  const result = uc.compute(state.values[uc.id]);
  const body = document.getElementById('results-body');

  // Store for export
  state.lastResult = result;

  const threeYr = {
    gross: result.years.reduce((s, y) => s + y.gross, 0),
    fee:   result.years.reduce((s, y) => s + y.fee, 0),
    net:   result.years.reduce((s, y) => s + y.net, 0),
  };
  const blendedROI = threeYr.gross / (threeYr.fee || 1);
  const boedAnnual = result.years.map(y => y.boedRecovered).filter(x => x !== undefined);

  // Hero metrics
  let heroHTML = `
    <div class="hero-metrics">
      <div class="hero-metric">
        <div class="hero-label">3-Yr Gross Value</div>
        <div class="hero-value accent">${fmtUSD(threeYr.gross)}</div>
        <div class="hero-detail">Cumulative customer value before Cohere fees</div>
      </div>
      <div class="hero-metric">
        <div class="hero-label">Blended ROI</div>
        <div class="hero-value roi">${fmtROI(blendedROI)}</div>
        <div class="hero-detail">Gross value ÷ 3-yr Cohere fees</div>
      </div>
      <div class="hero-metric">
        <div class="hero-label">3-Yr Net Value</div>
        <div class="hero-value">${fmtUSD(threeYr.net)}</div>
        <div class="hero-detail">After ${fmtUSD(threeYr.fee)} in platform fees</div>
      </div>
      <div class="hero-metric">
        <div class="hero-label">Year 1 Payback</div>
        <div class="hero-value">${(result.years[0].fee / (result.years[0].gross / 12)).toFixed(1)}<span class="sub">mo</span></div>
        <div class="hero-detail">Months to recover pilot fee at Y1 run-rate</div>
      </div>
    </div>
  `;

  // Year-by-year table
  let yearHTML = `
    <div class="year-table">
      <div class="year-table-header">
        <div>Metric</div><div>Year 1</div><div>Year 2</div><div>Year 3</div><div>3-Yr</div>
      </div>
      <div class="year-table-row">
        <div>Users (avg.)</div>
        <div>${fmtNum(result.years[0].users)}</div>
        <div>${fmtNum(result.years[1].users)}</div>
        <div>${fmtNum(result.years[2].users)}</div>
        <div>—</div>
      </div>
      ${boedAnnual.length ? `
      <div class="year-table-row highlight">
        <div>BOE/d recovered</div>
        <div>${fmtNum(result.years[0].boedRecovered)}</div>
        <div>${fmtNum(result.years[1].boedRecovered)}</div>
        <div>${fmtNum(result.years[2].boedRecovered)}</div>
        <div>—</div>
      </div>` : ''}
      <div class="year-table-row">
        <div>Gross value</div>
        <div>${fmtUSD(result.years[0].gross)}</div>
        <div>${fmtUSD(result.years[1].gross)}</div>
        <div>${fmtUSD(result.years[2].gross)}</div>
        <div>${fmtUSD(threeYr.gross)}</div>
      </div>
      <div class="year-table-row">
        <div>Cohere fee</div>
        <div>${fmtUSD(result.years[0].fee)}</div>
        <div>${fmtUSD(result.years[1].fee)}</div>
        <div>${fmtUSD(result.years[2].fee)}</div>
        <div>${fmtUSD(threeYr.fee)}</div>
      </div>
      <div class="year-table-row total">
        <div>Net value</div>
        <div>${fmtUSD(result.years[0].net)}</div>
        <div>${fmtUSD(result.years[1].net)}</div>
        <div>${fmtUSD(result.years[2].net)}</div>
        <div>${fmtUSD(threeYr.net)}</div>
      </div>
      <div class="year-table-row total">
        <div>ROI</div>
        <div>${fmtROI(result.years[0].roi)}</div>
        <div>${fmtROI(result.years[1].roi)}</div>
        <div>${fmtROI(result.years[2].roi)}</div>
        <div>${fmtROI(blendedROI)}</div>
      </div>
    </div>
  `;

  // Driver breakdown (3-yr)
  const driverTotals = result.drivers.map(d => {
    const total = result.years.reduce((s, y) => s + (y[d.key] || 0), 0);
    return { ...d, total };
  }).sort((a, b) => b.total - a.total);
  const driverMax = Math.max(...driverTotals.map(d => d.total), 1);

  let driverHTML = `
    <div style="margin-top: 24px;">
      <div class="section-title" style="margin-bottom: 14px;">Value drivers · 3-year</div>
      <div class="driver-list">
        ${driverTotals.map(d => `
          <div class="driver-item">
            <div class="driver-header">
              <div class="driver-name">${d.name}</div>
              <div class="driver-value">${fmtUSD(d.total)}</div>
            </div>
            <div class="driver-subline">
              <span>${fmtPct(d.total / threeYr.gross)}</span>
              <span>${fmtUSDFull(d.total)}</span>
            </div>
            <div class="driver-bar">
              <div class="driver-bar-fill" style="width: ${(d.total/driverMax*100).toFixed(1)}%;"></div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  // Stacked bar chart by year, by driver
  const yearMax = Math.max(...result.years.map(y => y.gross), 1);
  const feeMax = Math.max(...result.years.map(y => y.fee), 1);
  const chartMax = Math.max(yearMax, feeMax);

  let chartHTML = `
    <div class="chart-wrap">
      <div class="chart-title">Value Build — Stacked by Driver</div>
      <div class="chart-bars">
        ${result.years.map((y, yi) => {
          const pct = (y.gross / chartMax) * 100;
          let cum = 0;
          const segments = result.drivers.map((d, di) => {
            const v = y[d.key] || 0;
            const segPct = (v / y.gross) * 100;
            cum += segPct;
            return `<div class="chart-segment" style="height: ${segPct}%; background: ${driverColor(di)}"></div>`;
          }).join('');
          return `
            <div class="chart-bar-col">
              <div class="chart-total">${fmtUSD(y.gross)}</div>
              <div class="chart-stack" style="height: ${pct}%;">${segments}</div>
              <div class="chart-label">Year ${yi+1}</div>
            </div>
          `;
        }).join('')}
      </div>
      <div class="chart-legend">
        ${result.drivers.map((d, i) => `
          <div class="legend-item">
            <div class="legend-swatch" style="background: ${driverColor(i)}"></div>
            ${d.name}
          </div>
        `).join('')}
      </div>
    </div>
  `;

  // Caveat
  let caveatHTML = '';
  if (uc.id === 'field') {
    caveatHTML = `<div class="caveat"><strong>Context:</strong> Netback per bbl: <strong>$${result.context.netback.toFixed(2)}</strong> · Field-response events/yr: <strong>${fmtNum(result.context.eventsPerYear)}</strong>. Adjust oil price, NRI, and downtime reduction to flex the largest lever.</div>`;
  } else if (uc.id === 'safety') {
    caveatHTML = `<div class="caveat"><strong>Context:</strong> Derived incidents: <strong>${result.context.recordables.toFixed(1)}</strong> recordables, <strong>${result.context.ltis.toFixed(1)}</strong> lost-time / yr across <strong>${fmtNum(result.context.workforce)}</strong> workforce-equivalent. Premium savings phase in (0% / 50% / 100%).</div>`;
  } else if (uc.id === 'prod') {
    caveatHTML = `<div class="caveat"><strong>Context:</strong> Total baseline deferral: <strong>${fmtPct(result.context.totalDeferral, 2)}</strong> of production = <strong>${fmtNum(result.context.totalBoedBase)}</strong> BOE/d exposed · Effective netback post-haircuts: <strong>$${result.context.netback.toFixed(2)}</strong>/BOE.</div>`;
  } else if (uc.id === 'jobplan') {
    caveatHTML = `<div class="caveat"><strong>Context:</strong> Global annual jobs: <strong>${fmtNum(result.context.jobsYearFull)}</strong> · Planner hours saved per job: <strong>${fmtNum(result.context.hoursSavedPerJob, 1)}</strong>. Planner-hours savings and cycle-time revenue pull-forward are the largest levers.</div>`;
  } else if (uc.id === 'workforce') {
    caveatHTML = `<div class="caveat"><strong>Context:</strong> Days saved per req: <strong>${fmtNum(result.context.daysSavedPerReq, 0)}</strong> · Certification-gap reduction: <strong>${fmtPct(result.context.gapRateDelta, 1)}</strong>. Recruiting & time-to-fill typically dominates the value stack; certification-gap avoidance is the highest-leverage operational driver.</div>`;
  }

  body.innerHTML = heroHTML + yearHTML + driverHTML + chartHTML + caveatHTML;
}


function renderAll() {
  renderSidebar();
  renderHeader();
  renderInputs();
  renderResults();
}

document.getElementById('btn-reset').addEventListener('click', () => {
  const uc = USE_CASES.find(u => u.id === state.activeId);
  if (!confirm(`Reset all assumptions for "${uc.name}" to defaults?`)) return;
  uc.sections.forEach(s => s.inputs.forEach(inp => {
    state.values[uc.id][inp.id] = inp.default;
  }));
  renderAll();
});

document.getElementById('btn-export').addEventListener('click', () => {
  const uc = USE_CASES.find(u => u.id === state.activeId);
  const r = state.lastResult;

  let text = `COHERE NORTH · VALUE APPRAISAL SNAPSHOT\n`;
  text += `Use Case: ${uc.name}\n`;
  text += `Generated: ${new Date().toLocaleString()}\n`;
  text += `${'='.repeat(70)}\n\n`;

  const threeYr = {
    gross: r.years.reduce((s, y) => s + y.gross, 0),
    fee:   r.years.reduce((s, y) => s + y.fee, 0),
    net:   r.years.reduce((s, y) => s + y.net, 0),
  };
  text += `HEADLINE\n`;
  text += `  3-Yr Gross Value:  ${fmtUSDFull(threeYr.gross)}\n`;
  text += `  3-Yr Cohere Fees:  ${fmtUSDFull(threeYr.fee)}\n`;
  text += `  3-Yr Net Value:    ${fmtUSDFull(threeYr.net)}\n`;
  text += `  Blended ROI:       ${fmtROI(threeYr.gross / threeYr.fee)}\n\n`;
  text += `BY YEAR\n`;
  r.years.forEach((y, i) => {
    text += `  Year ${i+1}: ${fmtNum(y.users).padStart(6)} users | Gross ${fmtUSDFull(y.gross).padStart(14)} | Fee ${fmtUSDFull(y.fee).padStart(11)} | ROI ${fmtROI(y.roi).padStart(7)}`;
    if (y.boedRecovered !== undefined) text += ` | BOE/d ${fmtNum(y.boedRecovered).padStart(6)}`;
    text += `\n`;
  });
  text += `\nDRIVER BREAKDOWN (3-Year)\n`;
  r.drivers.forEach(d => {
    const total = r.years.reduce((s, y) => s + (y[d.key] || 0), 0);
    text += `  ${d.name.padEnd(32)} ${fmtUSDFull(total).padStart(14)} (${fmtPct(total/threeYr.gross)})\n`;
  });

  text += `\nASSUMPTIONS\n`;
  uc.sections.forEach(sec => {
    text += `  ${sec.title.toUpperCase()}\n`;
    sec.inputs.forEach(inp => {
      const v = state.values[uc.id][inp.id];
      const disp = inp.pct ? fmtPct(v, 2) : (inp.unit === '$' ? fmtUSDFull(v) : fmtNum(v, (Math.abs(v) < 1 && v !== 0) ? 2 : 0) + ' ' + inp.unit);
      text += `    ${inp.label.padEnd(48)} ${disp}\n`;
    });
  });

  // Download as .txt
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `cohere-north_${uc.id}_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
});

// ============================================================
// INITIALIZE
// ============================================================
renderAll();
</script>
</body>
</html>
